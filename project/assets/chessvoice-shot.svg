<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <!-- chess.com-style backdrop -->
  <rect width="560" height="200" fill="#312e2b"/>

  <!-- board crop: files d-h, ranks 4-1 (white's half), 50px squares -->
  <g>
    <rect width="250" height="200" fill="#779556"/>
    <g fill="#ebecd0">
      <rect x="50" y="0" width="50" height="50"/><rect x="150" y="0" width="50" height="50"/>
      <rect x="0" y="50" width="50" height="50"/><rect x="100" y="50" width="50" height="50"/><rect x="200" y="50" width="50" height="50"/>
      <rect x="50" y="100" width="50" height="50"/><rect x="150" y="100" width="50" height="50"/>
      <rect x="0" y="150" width="50" height="50"/><rect x="100" y="150" width="50" height="50"/><rect x="200" y="150" width="50" height="50"/>
    </g>
    <!-- last move played by voice: g1 -> f3 -->
    <rect x="150" y="150" width="50" height="50" fill="#f5f682" opacity="0.5"/>
    <rect x="100" y="50" width="50" height="50" fill="#f5f682" opacity="0.5"/>
    <!-- white pieces after 1.e4 e5 2.Nf3 (solid glyphs, tinted white) -->
    <g font-size="40" text-anchor="middle" fill="#fafafa" stroke="#3a3a3a" stroke-width="0.7">
      <text x="75" y="40">♟</text>   <!-- e4 pawn -->
      <text x="125" y="90">♞</text>  <!-- Nf3, just landed -->
      <text x="125" y="140">♟</text> <!-- f2 -->
      <text x="175" y="140">♟</text> <!-- g2 -->
      <text x="225" y="140">♟</text> <!-- h2 -->
      <text x="25" y="190">♛</text>  <!-- Qd1 -->
      <text x="75" y="190">♚</text>  <!-- Ke1 -->
      <text x="225" y="190">♜</text> <!-- Rh1 -->
    </g>
  </g>

  <!-- side panel: move list + TTS announce -->
  <g>
    <rect x="250" y="0" width="310" height="200" fill="#262421"/>
    <text x="274" y="34" fill="#8b8987" font-size="11" letter-spacing="1.5">CHESSVOICE · CHESS.COM</text>
    <text x="274" y="64" font-size="13" fill="#c3c2c1"><tspan fill="#8b8987">1.</tspan> e4  <tspan fill="#e0e0e0">e5</tspan></text>
    <text x="274" y="86" font-size="13" fill="#c3c2c1"><tspan fill="#8b8987">2.</tspan> <tspan fill="#fff" font-weight="600">Nf3</tspan></text>
    <line x1="274" y1="102" x2="536" y2="102" stroke="#3a3733"/>
    <text x="274" y="124" font-size="12" fill="#8b949e">🔊 "Knight f3 — your move"</text>
  </g>

  <!-- the real ChessVoice HUD: bottom-center overlay pill (isolated-world.ts) -->
  <g>
    <rect x="140" y="148" width="280" height="36" rx="10" fill="#0d1117" opacity="0.92" stroke="#30363d"/>
    <circle cx="158" cy="166" r="4" fill="#f0883e">
      <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="172" y="170" font-size="12"><tspan fill="#8b949e">Heard:</tspan> <tspan fill="#e0e0e0">« cavalier f3 »</tspan></text>
    <text x="368" y="170" font-size="12" fill="#3fb950" font-weight="600">✓ Nf3</text>
  </g>
</svg>
