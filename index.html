<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Basement // Sector 00 — Archive</title>
<meta name="description" content="THE BASEMENT — a first-person retro-horror portfolio hub. Walk the concrete archive by lantern-light and step through a door into a project.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #05060a; overflow: hidden; }
  * { box-sizing: border-box; }
  canvas { image-rendering: auto; }
  @keyframes grainmove { 0%{transform:translate(0,0)}10%{transform:translate(-4%,-6%)}20%{transform:translate(-8%,4%)}30%{transform:translate(6%,-8%)}40%{transform:translate(-6%,8%)}50%{transform:translate(8%,6%)}60%{transform:translate(-8%,-6%)}70%{transform:translate(6%,8%)}80%{transform:translate(-6%,-8%)}90%{transform:translate(8%,-4%)}100%{transform:translate(0,0)} }
  @keyframes introflick { 0%,93%,100%{opacity:1}94%{opacity:.35}96%{opacity:.9}97%{opacity:.5} }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
</head>
<body>
<div id="container" data-screen-label="Basement" style="position:fixed;inset:0;background:#05060a;overflow:hidden;font-family:'VT323',monospace;color:#cfc9ba;cursor:pointer;user-select:none">
  <div id="mount" style="position:absolute;inset:0;z-index:1"></div>
  <div id="grain" style="position:absolute;inset:-50%;width:200%;height:200%;background:url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27100%27 height=%27100%27%3E%3Cfilter id=%27n%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.85%27 numOctaves=%272%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%27 height=%27100%27 filter=%27url(%23n)%27/%3E%3C/svg%3E');background-size:180px 180px;opacity:.035;mix-blend-mode:screen;pointer-events:none;animation:grainmove .9s steps(1) infinite;z-index:5"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(0,0,0,0) 44%,rgba(0,0,0,.55) 100%);pointer-events:none;z-index:7"></div>
  <div style="position:absolute;left:50%;top:50%;width:4px;height:4px;margin:-2px 0 0 -2px;border-radius:50%;background:rgba(255,240,210,.22);box-shadow:0 0 3px rgba(255,200,120,.4);pointer-events:none;z-index:8"></div>
  <div id="hud" style="position:absolute;inset:0;z-index:10;pointer-events:none"></div>
</div>

<script>
// ============================================================================
// THE BASEMENT — standalone implementation of "The Basement.dc.html".
//
// The original is a Claude Design Component (./design/The Basement.dc.html)
// whose logic class is pure Three.js + imperative DOM; React/DCLogic were only
// a thin mount shell. This file ports that class verbatim and replaces the
// shell: design-editor props become their defaults, the `ref`-bound nodes
// become real DOM elements, and the React lifecycle becomes a direct boot call.
// Everything below the bootstrap is the original, unmodified game logic.
// ============================================================================

class Basement {
  // design-editor props (data-props defaults from the source component)
  props = { atmosphere: 7, lanternColor: '#ff8a3c', neonColor: '#bcd4ff', pixelation: 4, grain: true };

  mountRef = { current: null };
  containerRef = { current: null };
  grainRef = { current: null };
  hudRef = { current: null };

  keys = {};
  yaw = 0; pitch = 0; time = 0; walkDist = 0;
  phase = 'intro'; locked = false; muted = false;
  transitioning = false; portalArmed = true;
  signs = []; rooms = {}; activeRoom = 'hub';
  colliders = []; bounds = { RX: 9, RZ: 7 };
  inited = false;

  componentDidMount() {
    this._mounted = true;
    let tries = 0;
    const wait = () => {
      if (!this._mounted) return;
      if (window.THREE) {
        try { this.init(); } catch (e) { console.error(e); this.showError('Init error: ' + (e && e.message || e)); }
        return;
      }
      if (tries++ > 200) { this.showError('Could not load the 3D engine. Check your connection and reload.'); return; }
      setTimeout(wait, 40);
    };
    wait();
  }

  componentWillUnmount() {
    this._mounted = false;
    if (this._raf) cancelAnimationFrame(this._raf);
    document.removeEventListener('mousemove', this.onMouseMove);
    document.removeEventListener('mousedown', this.onMouseDown);
    document.removeEventListener('mouseup', this.onMouseUp);
    document.removeEventListener('keydown', this.onKeyDown);
    document.removeEventListener('keyup', this.onKeyUp);
    document.removeEventListener('pointerlockchange', this.onPLC);
    window.removeEventListener('resize', this.onResize);
    try { if (this.renderer) this.renderer.dispose(); } catch (e) {}
    try { if (this.audio) this.audio.ctx.close(); } catch (e) {}
  }

  scaleFromPixel(p) { return Math.max(0.12, Math.min(0.85, 0.7 - (p - 1) * 0.1)); }
  atmoApply(a) {
    if (this.scene && this.scene.fog) this.scene.fog.density = 0.03 + (a - 1) / 9 * 0.06;
    if (this.ambient) this.ambient.intensity = 0.95 - (a - 1) / 9 * 0.7;
  }

  // ---------- geometry helpers ----------
  box(w, h, d, mat, x, y, z) { const m = new window.THREE.Mesh(new window.THREE.BoxGeometry(w, h, d), mat); m.position.set(x, y, z); return m; }
  plane(w, h, mat, x, y, z, rx) { const m = new window.THREE.Mesh(new window.THREE.PlaneGeometry(w, h), mat); m.position.set(x, y, z); m.rotation.x = rx; return m; }
  aabb(x, z, hx, hz) { return { minX: x - hx, maxX: x + hx, minZ: z - hz, maxZ: z + hz }; }

  makeConcrete(base, speckle) {
    const T = window.THREE;
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const x = c.getContext('2d');
    x.fillStyle = base; x.fillRect(0, 0, 128, 128);
    for (let i = 0; i < 2600; i++) {
      const v = Math.random(); const g = Math.floor(speckle * v);
      x.fillStyle = 'rgba(' + g + ',' + g + ',' + (g + 5) + ',' + (0.12 + Math.random() * 0.5) + ')';
      const s = Math.random() * 2 + 0.5;
      x.fillRect(Math.random() * 128, Math.random() * 128, s, s);
    }
    x.strokeStyle = 'rgba(0,0,0,0.35)'; x.lineWidth = 1;
    for (let i = 0; i < 7; i++) {
      x.beginPath(); let px = Math.random() * 128, py = Math.random() * 128; x.moveTo(px, py);
      for (let j = 0; j < 5; j++) { px += (Math.random() - 0.5) * 34; py += (Math.random() - 0.5) * 34; x.lineTo(px, py); }
      x.stroke();
    }
    const tex = new T.CanvasTexture(c);
    tex.wrapS = tex.wrapT = T.RepeatWrapping;
    tex.magFilter = T.LinearFilter; tex.minFilter = T.LinearMipmapLinearFilter;
    tex.anisotropy = this.maxAniso || 1;
    return tex;
  }

  makeSignTex(text, fontSize, cw, ch) {
    const c = document.createElement('canvas'); c.width = cw; c.height = ch;
    const x = c.getContext('2d');
    x.clearRect(0, 0, cw, ch);
    x.font = '700 ' + fontSize + 'px monospace';
    x.textAlign = 'center'; x.textBaseline = 'middle';
    x.shadowColor = '#ffffff'; x.shadowBlur = Math.round(fontSize * 0.18); x.fillStyle = '#ffffff';
    x.fillText(text, cw / 2, ch / 2); x.shadowBlur = 0; x.fillText(text, cw / 2, ch / 2);
    const T = window.THREE;
    const tex = new T.CanvasTexture(c); tex.magFilter = T.LinearFilter; tex.minFilter = T.LinearFilter;
    return tex;
  }
  makeSignMesh(text, accentHex, planeW, planeH, fontSize, cw, ch) {
    const T = window.THREE;
    const tex = this.makeSignTex(text, fontSize, cw, ch);
    const mat = new T.MeshBasicMaterial({ map: tex, color: new T.Color(accentHex), transparent: true, opacity: 1, fog: false, blending: T.AdditiveBlending, depthWrite: false });
    const mesh = new T.Mesh(new T.PlaneGeometry(planeW, planeH), mat);
    return { mesh, mat };
  }

  // ---------- project exhibits (screen + placard) ----------
  loadTex(path) {
    const T = window.THREE;
    const tex = new T.TextureLoader().load(path);
    tex.magFilter = T.LinearFilter; tex.minFilter = T.LinearFilter;
    tex.anisotropy = this.maxAniso || 1;
    return tex;
  }

  // a wall-mounted, self-lit screen with a dark frame and a glowing accent bezel
  makeScreenGroup(tex, accentHex, w, h, x, y, z, ry) {
    const T = window.THREE;
    const grp = new T.Group();
    grp.add(this.box(w + 0.18, h + 0.18, 0.08, this.matDark, 0, 0, -0.02));
    const bezelMat = new T.MeshBasicMaterial({ color: new T.Color(accentHex), fog: false, transparent: true, opacity: 0.55, blending: T.AdditiveBlending, depthWrite: false });
    const bezel = new T.Mesh(new T.PlaneGeometry(w + 0.14, h + 0.14), bezelMat); bezel.position.z = 0.012; grp.add(bezel);
    const scrMat = new T.MeshBasicMaterial({ map: tex, fog: false });
    const scr = new T.Mesh(new T.PlaneGeometry(w, h), scrMat); scr.position.z = 0.03; grp.add(scr);
    grp.position.set(x, y, z); grp.rotation.y = ry;
    return grp;
  }

  // procedural CRT-terminal texture (used for the minishell exhibit — a C/shell
  // project has no UI screenshot, so we render an authentic-looking session)
  makeTerminalTex() {
    const cw = 1024, ch = 640;
    const c = document.createElement('canvas'); c.width = cw; c.height = ch;
    const x = c.getContext('2d');
    x.fillStyle = '#04060a'; x.fillRect(0, 0, cw, ch);
    x.fillStyle = '#10151e'; x.fillRect(0, 0, cw, 52);
    ['#ff5f56', '#ffbd2e', '#27c93f'].forEach((col, i) => { x.fillStyle = col; x.beginPath(); x.arc(34 + i * 30, 26, 9, 0, Math.PI * 2); x.fill(); });
    x.fillStyle = '#8a93a6'; x.font = '600 24px monospace'; x.textAlign = 'center'; x.textBaseline = 'middle';
    x.fillText('minishell — 80x24', cw / 2, 26);
    x.textAlign = 'left'; x.textBaseline = 'top';
    const P = '#6fe3ff', U = '#d8e0cf', O = '#cfe8b8', D = '#5a6472', G = '#7dff8a';
    const rows = [
      [[D, '$ '], [U, 'make']],
      [[D, 'cc -Wall -Wextra -Werror src/*.c -lreadline -o minishell']],
      [[G, 'minishell ready  ✓']],
      [],
      [[D, '$ '], [U, './minishell']],
      [[P, 'minishell$ '], [U, 'echo "hello 42" | cat -e']],
      [[O, 'hello 42$']],
      [[P, 'minishell$ '], [U, 'export PATH="$PATH:/usr/bin"']],
      [[P, 'minishell$ '], [U, 'ls -la | grep .c | wc -l']],
      [[O, '      14']],
      [[P, 'minishell$ '], [U, 'cat < in.txt | sort > out.txt']],
      [[P, 'minishell$ '], [U, 'echo $?']],
      [[O, '0']],
      [[P, 'minishell$ '], [G, '█']],
    ];
    x.font = '400 26px monospace';
    let yy = 74; const lh = 38, px = 28;
    for (const row of rows) {
      let xx = px;
      for (const seg of row) { x.fillStyle = seg[0]; x.fillText(seg[1], xx, yy); xx += x.measureText(seg[1]).width; }
      yy += lh;
    }
    x.fillStyle = 'rgba(0,0,0,0.18)';
    for (let i = 52; i < ch; i += 4) x.fillRect(0, i, cw, 2);
    const T = window.THREE;
    const tex = new T.CanvasTexture(c); tex.magFilter = T.LinearFilter; tex.minFilter = T.LinearFilter;
    return tex;
  }

  // description plaque rendered to a canvas (title, blurb, tech, link)
  makePlacardTex(info, accentHex) {
    const cw = 1024, ch = 680;
    const c = document.createElement('canvas'); c.width = cw; c.height = ch;
    const x = c.getContext('2d');
    x.fillStyle = '#090b10'; x.fillRect(0, 0, cw, ch);
    x.strokeStyle = accentHex; x.lineWidth = 6; x.strokeRect(12, 12, cw - 24, ch - 24);
    x.strokeStyle = 'rgba(255,255,255,0.06)'; x.lineWidth = 2; x.strokeRect(28, 28, cw - 56, ch - 56);
    const pad = 60;
    x.textAlign = 'left'; x.textBaseline = 'top';
    x.font = '700 26px monospace'; x.fillStyle = 'rgba(160,170,190,0.85)';
    x.fillText(info.kicker, pad, 50);
    x.font = '700 68px monospace'; x.fillStyle = accentHex;
    x.shadowColor = accentHex; x.shadowBlur = 18; x.fillText(info.title, pad, 86); x.shadowBlur = 0;
    x.fillStyle = accentHex; x.fillRect(pad, 176, cw - pad * 2, 4);
    x.font = '400 33px monospace'; x.fillStyle = '#d6d0c2';
    let yy = 206; for (const line of info.lines) { x.fillText(line, pad, yy); yy += 44; }
    yy += 12;
    x.font = '700 28px monospace'; x.fillStyle = accentHex; x.fillText(info.tech, pad, yy); yy += 44;
    x.font = '400 27px monospace'; x.fillStyle = 'rgba(150,162,184,0.92)'; x.fillText(info.link, pad, yy);
    const T = window.THREE;
    const tex = new T.CanvasTexture(c); tex.magFilter = T.LinearFilter; tex.minFilter = T.LinearFilter;
    return tex;
  }

  // ---------- rooms ----------
  buildHub() {
    const T = window.THREE, RX = 9, RZ = 7, H = 3.2;
    const g = new T.Group(); this.scene.add(g);
    const colliders = [];
    g.add(this.plane(RX * 2, RZ * 2, this.matFloor, 0, 0, 0, -Math.PI / 2));
    g.add(this.plane(RX * 2, RZ * 2, this.matCeil, 0, H, 0, Math.PI / 2));
    g.add(this.box(RX * 2, H, 0.4, this.matWall, 0, H / 2, RZ + 0.2));
    g.add(this.box(0.4, H, RZ * 2, this.matWall, -RX - 0.2, H / 2, 0));
    g.add(this.box(0.4, H, RZ * 2, this.matWall, RX + 0.2, H / 2, 0));

    const doors = [-5, 0, 5];
    const targets = ['notichess', 'minishell', 'foreman'];
    const names = ['NOTICHESS', 'MINISHELL', 'FOREMAN'];
    const cols = ['#6fe3ff', '#8dff6f', '#ffb43c'];
    const segs = [[-7.425, 3.15], [-2.5, 3.3], [2.5, 3.3], [7.425, 3.15]];
    for (const s of segs) g.add(this.box(s[1], H, 0.4, this.matWall, s[0], H / 2, -RZ - 0.2));
    doors.forEach((dx, i) => {
      g.add(this.box(1.9, 0.8, 0.4, this.matWall, dx, 2.8, -RZ - 0.2));
      g.add(this.box(0.14, 2.4, 0.3, this.matMetal, dx - 0.92, 1.2, -RZ));
      g.add(this.box(0.14, 2.4, 0.3, this.matMetal, dx + 0.92, 1.2, -RZ));
      g.add(this.box(1.84, 0.12, 0.3, this.matMetal, dx, 2.45, -RZ));
      g.add(this.box(1.8, 2.4, 0.05, this.matDark, dx, 1.2, -RZ - 0.45));
      const sg = this.makeSignMesh(names[i], cols[i], 1.9, 0.53, 84, 640, 180);
      sg.mesh.position.set(dx, 2.74, -RZ + 0.14); g.add(sg.mesh);
      g.add(this.box(2.06, 0.69, 0.06, this.matDark, dx, 2.74, -RZ + 0.06));
      const light = new T.PointLight(new T.Color(cols[i]), 1.4, 6.5, 1.8); light.position.set(dx, 2.5, -RZ + 0.9); g.add(light);
      this.signs.push({ mat: sg.mat, light: light, base: new T.Color(cols[i]), lbase: 1.6, type: 'neon', t: Math.random() * 2, dur: 0.5 + Math.random(), mode: 'on', ph: Math.random() * 6 });
    });

    [[-4.5, -2.0], [4.2, 1.5]].forEach((c) => { g.add(this.box(0.85, H, 0.85, this.matCol, c[0], H / 2, c[1])); colliders.push(this.aabb(c[0], c[1], 0.45, 0.45)); });
    [[-6.6, 0.5, 3.4, 0.2], [-5.5, 0.5, 2.9, -0.4], [-6.6, 1.5, 3.4, 0.25], [6.3, 0.5, -3.8, 0.5]].forEach((c) => { const m = this.box(1, 1, 1, this.matWood, c[0], c[1], c[2]); m.rotation.y = c[3]; g.add(m); colliders.push(this.aabb(c[0], c[2], 0.6, 0.6)); });
    { const b = new T.Mesh(new T.CylinderGeometry(0.5, 0.5, 1.1, 14), this.matMetal); b.position.set(6.4, 0.55, 3.6); g.add(b); colliders.push(this.aabb(6.4, 3.6, 0.55, 0.55)); }
    [-2.2, -4.6, 2.6].forEach((pz) => { const p = new T.Mesh(new T.CylinderGeometry(0.07, 0.07, RX * 1.85, 8), this.matPipe); p.rotation.z = Math.PI / 2; p.position.set(0, H - 0.32, pz); g.add(p); });

    const fxX = 2.4, fxZ = 1.2;
    g.add(this.box(2.0, 0.12, 0.36, this.matFix, fxX, H - 0.06, fxZ));
    this.tubeMat = new T.MeshBasicMaterial({ color: this.neonColor.clone(), fog: false });
    const tube = new T.Mesh(new T.BoxGeometry(1.74, 0.07, 0.17), this.tubeMat); tube.position.set(fxX, H - 0.16, fxZ); g.add(tube);
    this.fluoLight = new T.PointLight(this.neonColor.clone(), 0, 14, 1.6); this.fluoLight.position.set(fxX, H - 0.45, fxZ); g.add(this.fluoLight);
    this.fluo = { t: 0, dur: 1, mode: 'on', val: 1 };

    const portals = doors.map((dx, i) => ({ kind: 'negz', x: dx, target: targets[i], spawn: this.rooms[targets[i]].spawn, label: names[i] }));
    this.rooms.hub = { group: g, colliders: colliders, bounds: { RX: RX, RZ: RZ, doorsNegZ: doors, doorsPosZ: [] }, portals: portals, spawn: { x: 0, z: RZ - 1.6, yaw: 0 } };
  }

  buildProject(key, display, accent, hubDoorX, info) {
    const T = window.THREE, RX = 6, RZ = 5, H = 3.2;
    const g = new T.Group(); g.visible = false; this.scene.add(g);
    const colliders = [];
    g.add(this.plane(RX * 2, RZ * 2, this.matFloor, 0, 0, 0, -Math.PI / 2));
    g.add(this.plane(RX * 2, RZ * 2, this.matCeil, 0, H, 0, Math.PI / 2));
    g.add(this.box(RX * 2, H, 0.4, this.matWall, 0, H / 2, -RZ - 0.2));
    g.add(this.box(0.4, H, RZ * 2, this.matWall, -RX - 0.2, H / 2, 0));
    g.add(this.box(0.4, H, RZ * 2, this.matWall, RX + 0.2, H / 2, 0));
    // +Z wall with single doorway (exit to hub)
    g.add(this.box(5.15, H, 0.4, this.matWall, -3.425, H / 2, RZ + 0.2));
    g.add(this.box(5.15, H, 0.4, this.matWall, 3.425, H / 2, RZ + 0.2));
    g.add(this.box(1.9, 0.8, 0.4, this.matWall, 0, 2.8, RZ + 0.2));
    g.add(this.box(0.14, 2.4, 0.3, this.matMetal, -0.92, 1.2, RZ));
    g.add(this.box(0.14, 2.4, 0.3, this.matMetal, 0.92, 1.2, RZ));
    g.add(this.box(1.84, 0.12, 0.3, this.matMetal, 0, 2.45, RZ));
    g.add(this.box(1.8, 2.4, 0.05, this.matDark, 0, 1.2, RZ + 0.45));

    const np = this.makeSignMesh(display, accent, 4.0, 0.94, 150, 1024, 240);
    np.mesh.position.set(0, 1.95, -RZ + 0.13); g.add(np.mesh);
    g.add(this.box(4.2, 1.1, 0.06, this.matDark, 0, 1.95, -RZ + 0.05));
    const npl = new T.PointLight(new T.Color(accent), 1.1, 9, 1.6); npl.position.set(0, 2.2, -RZ + 1.6); g.add(npl);
    this.signs.push({ mat: np.mat, light: npl, base: new T.Color(accent), lbase: 1.2, type: 'soft', t: Math.random(), dur: 1 + Math.random() * 2, mode: 'on', ph: Math.random() * 6 });
    const sub = this.makeSignMesh(info.tagline, accent, 2.9, 0.34, 50, 1100, 150);
    sub.mesh.position.set(0, 1.2, -RZ + 0.13); sub.mat.opacity = 0.8; g.add(sub.mesh);
    this.signs.push({ mat: sub.mat, light: null, base: new T.Color(accent), lbase: 0, type: 'soft', t: Math.random(), dur: 2, mode: 'on', ph: Math.random() * 6 });

    const ex = this.makeSignMesh('EXIT', '#cfd6e6', 1.2, 0.36, 70, 512, 170);
    ex.mesh.position.set(0, 2.5, RZ - 0.14); ex.mesh.rotation.y = Math.PI; g.add(ex.mesh);
    g.add(this.box(1.36, 0.5, 0.06, this.matDark, 0, 2.5, RZ - 0.06));
    this.signs.push({ mat: ex.mat, light: null, base: new T.Color('#cfd6e6'), lbase: 0, type: 'neon', t: Math.random(), dur: 0.8, mode: 'on', ph: Math.random() * 6 });

    // glowing project artifact on a pedestal
    g.add(this.box(1.2, 0.5, 1.2, this.matMetal, 0, 0.25, -0.5)); colliders.push(this.aabb(0, -0.5, 0.62, 0.62));
    const cube = new T.Mesh(new T.BoxGeometry(0.5, 0.5, 0.5), new T.MeshBasicMaterial({ color: new T.Color(accent), fog: false }));
    cube.position.set(0, 0.75, -0.5); g.add(cube);
    const cl = new T.PointLight(new T.Color(accent), 0.7, 5, 2); cl.position.set(0, 1.1, -0.5); g.add(cl);

    // ---- exhibits: visual monitor (left wall) + description placard (right wall) ----
    const scrTex = info.kind === 'terminal' ? this.makeTerminalTex() : this.loadTex(info.image);
    g.add(this.makeScreenGroup(scrTex, accent, 3.5, 2.18, -RX + 0.12, 1.62, -0.6, Math.PI / 2));
    const ml = new T.PointLight(new T.Color(accent), 0.5, 6.5, 1.7); ml.position.set(-RX + 1.5, 1.7, -0.6); g.add(ml);

    const plTex = this.makePlacardTex(info, accent);
    g.add(this.makeScreenGroup(plTex, accent, 3.5, 2.32, RX - 0.12, 1.6, -0.6, -Math.PI / 2));
    const pl = new T.PointLight(new T.Color(accent), 0.4, 6.5, 1.7); pl.position.set(RX - 1.5, 1.7, -0.6); g.add(pl);

    this.rooms[key] = {
      group: g, colliders: colliders,

      this.checkPortals();
    }

    const ln = 0.86 + 0.10 * Math.sin(this.time * 11) + 0.06 * Math.sin(this.time * 23.3) + 0.05 * (Math.random() - 0.5);
    this.lanternLight.intensity = 2.5 * ln;
    this.lanternLight.position.x = 0.3 + Math.sin(this.time * 7) * 0.012;
    if (this.flame) this.flame.scale.set(1, 1 + 0.25 * Math.sin(this.time * 30) + 0.1 * Math.sin(this.time * 12), 1);
    const lg = this.lantern, bobv = (this.keys['KeyW'] || this.keys['KeyA'] || this.keys['KeyS'] || this.keys['KeyD']) ? Math.sin(this.time * 9) * 0.012 : 0;
    lg.position.y = -0.30 + Math.sin(this.time * 1.3) * 0.006 + bobv;
    lg.position.x = 0.32 + Math.sin(this.time * 1.7) * 0.006;
    lg.rotation.z = Math.sin(this.time * 1.1) * 0.05;

    if (this.activeRoom === 'hub' && this.fluoLight) {
      const fv = this.updateFluo(dt);
      this.fluoLight.intensity = 2.8 * fv;
      this.tubeMat.color.copy(this.neonColor).multiplyScalar(Math.min(1.3, fv));
      if (this.audio && this.audio.buzzGain) this.audio.buzzGain.gain.value = 0.02 * fv * fv;
    } else if (this.audio && this.audio.buzzGain) { this.audio.buzzGain.gain.value = 0; }

    for (const s of this.signs) this.updateSign(s, dt);
    this.renderer.render(this.scene, this.camera);
  };
}

// ---------- bootstrap (replaces the React/DCLogic mount shell) ----------
(function boot() {
  const start = () => {
    const game = new Basement();
    const container = document.getElementById('container');
    game.containerRef.current = container;
    game.mountRef.current = document.getElementById('mount');
    game.grainRef.current = document.getElementById('grain');
    game.hudRef.current = document.getElementById('hud');
    container.addEventListener('click', game.onClick);
    window.__basement = game; // expose for debugging
    game.componentDidMount();
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
